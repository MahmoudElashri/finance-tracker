<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Finance"/>
<meta name="theme-color" content="#0a0a1a"/>
<title>Finance Tracker</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/svg+xml" href="./icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Dark navy palette */
    --bg-0: #0a0a1a;
    --bg-1: #141428;
    --bg-2: #1a1a2e;
    --bg-3: #16213e;
    --card: rgba(255,255,255,0.035);
    --card-hover: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.12);
    --text: #e8e8f0;
    --text-dim: #a0a0b8;
    --muted: #6b6b8a;
    --muted-2: #4a4a6a;
    --accent: #6c5ce7;
    --accent-soft: rgba(108,92,231,0.15);
    --green: #27ae60;
    --green-soft: rgba(39,174,96,0.12);
    --red: #e74c3c;
    --red-soft: rgba(231,76,60,0.12);
    --orange: #e67e22;
    --orange-soft: rgba(230,126,34,0.12);
    --yellow: #f39c12;
    --yellow-soft: rgba(243,156,18,0.15);
    --teal: #1abc9c;
    --teal-soft: rgba(26,188,156,0.12);
    --purple: #9b59b6;
    --purple-soft: rgba(155,89,182,0.12);
    --blue: #3498db;
    --input-bg: #1e1e3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html,body { overscroll-behavior: none; }
  /* Solid dark fill on html/body matches <meta theme-color> so the iOS
     Safari overscroll area, safe-area insets, and the strip behind the
     URL/tool bar never flash white. The gradient itself is painted by a
     fixed pseudo-element below so it stays put regardless of how the
     Safari chrome animates in and out. */
  html {
    background-color: #0a0a1a;
    min-height: 100%;
  }
  body {
    background-color: #0a0a1a;
    color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif;
    min-height: 100dvh;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    padding-bottom: env(safe-area-inset-bottom);
    overscroll-behavior-y: contain;
    position: relative;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    background: linear-gradient(160deg, #0a0a1a 0%, #141428 50%, #0d1b2a 100%);
    pointer-events: none;
  }
  /* When a form input is focused and the iOS keyboard is open, lock body to
     the visible viewport height and let .app scroll internally. This prevents
     iOS from letting the page scroll into empty whitespace beyond content. */
  body.kb-lock {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--visible-h, 100dvh);
    min-height: 0;
    overflow: hidden;
    padding-bottom: 0;
  }
  body.kb-lock .app {
    height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
    /* Extra bottom room so inputs near the end of the page can always
       be scrolled above the iOS keyboard. */
    padding-bottom: 60vh;
  }
  /* Give focused form fields a scroll margin so scrollIntoView lands them
     comfortably inside the visible viewport rather than flush against the
     keyboard. */
  .amt-input, .text-input, .select-input, .editable-label, textarea, input {
    scroll-margin-top: 80px;
    scroll-margin-bottom: 120px;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight: 500; letter-spacing: -0.3px; }
  ::-webkit-scrollbar { width: 0; display: none; }

  /* ── LAYOUT ──────────────────────── */
  .app {
    max-width: 500px; margin: 0 auto;
    padding: calc(20px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) 100px calc(14px + env(safe-area-inset-left));
    min-height: 100dvh;
  }
  .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 22px; }
  .page-header h1 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.5px; line-height: 1.15; }
  .page-header h1 .accent { color: var(--accent); }
  .page-header .subtitle { font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 400; }

  .header-actions { display: flex; gap: 8px; }
  .icon-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.15s; }
  .icon-btn:hover, .icon-btn:active { background: var(--card-hover); color: #fff; }

  /* ── CARDS ──────────────────────── */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .card-title-left { display: flex; align-items: center; gap: 6px; }
  .note { font-size: 11px; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }

  /* ── KPI GRID ──────────────────────── */
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .kpi {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px;
    position: relative;
    overflow: hidden;
  }
  .kpi::before { content: ""; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--accent-color, var(--accent)); }
  .kpi-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; margin-bottom: 4px; }
  .kpi-value { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .kpi-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }

  /* ── PILL TABS ──────────────────────── */
  .tab-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 14px; padding: 4px; background: var(--card); border-radius: 10px; border: 1px solid var(--border); }
  .tab-row-scroll { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; padding: 4px; background: var(--card); border-radius: 10px; border: 1px solid var(--border); margin-bottom: 14px; }
  .tab {
    padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 11px; font-weight: 600; font-family: inherit;
    background: transparent; color: var(--muted);
    transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .tab.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(108,92,231,0.3); }
  .tab-row-scroll .tab { flex: 0 0 auto; }

  /* ── FORM ROWS ──────────────────────── */
  .form-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 11px 0; border-bottom: 1px solid var(--border);
  }
  .form-row:last-child { border-bottom: none; }
  .form-label { font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .form-label-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .editable-label {
    background: transparent; border: none; color: var(--text);
    font-family: inherit; font-size: 16px; outline: none;
    padding: 2px 4px; border-radius: 4px; min-width: 0; flex: 1;
  }
  .editable-label:focus { background: rgba(108,92,231,0.1); }

  /* ── INPUTS ──────────────────────── */
  .amt-input {
    width: 108px; padding: 9px 12px;
    border-radius: 9px; border: 1.5px solid var(--border);
    background: var(--input-bg); color: #fff;
    font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 500;
    outline: none; text-align: right;
    transition: border-color 0.15s, background 0.15s;
    -moz-appearance: textfield;
  }
  .amt-input::-webkit-outer-spin-button,
  .amt-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .amt-input:focus { border-color: var(--accent); background: #242247; }
  .amt-input::placeholder { color: var(--muted-2); }

  .text-input {
    width: 100%; padding: 10px 12px;
    border-radius: 9px; border: 1.5px solid var(--border);
    background: var(--input-bg); color: #fff;
    font-family: inherit; font-size: 16px; outline: none;
    transition: border-color 0.15s;
  }
  .text-input:focus { border-color: var(--accent); }

  .select-input {
    padding: 9px 10px; border-radius: 9px;
    border: 1.5px solid var(--border);
    background: var(--input-bg); color: #fff;
    font-family: inherit; font-size: 14px; font-weight: 500;
    outline: none; cursor: pointer;
    appearance: none; -webkit-appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--text-dim) 50%), linear-gradient(135deg, var(--text-dim) 50%, transparent 50%);
    background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
    padding-right: 26px;
  }
  .select-input:focus { border-color: var(--accent); }

  /* ── PAID-WITH PILL ROW ──────────────────────── */
  .pw-row { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding: 2px 0 4px; }
  .pw-row::-webkit-scrollbar { display: none; }
  .pw-chip {
    flex: 0 0 auto; padding: 7px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 600; font-family: inherit;
    background: var(--card); color: var(--text-dim);
    border: 1.5px solid var(--border); cursor: pointer;
    white-space: nowrap; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .pw-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .pw-chip.debt.active { background: var(--red); border-color: var(--red); }
  .pw-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; opacity: 0.9; }

  /* ── TRANSACTION LIST ──────────────────────── */
  .tx-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .tx-row {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 10px; border-radius: 10px;
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border);
  }
  .tx-row .tx-cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .tx-row .tx-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .tx-row .tx-cat-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .tx-row .tx-meta { font-size: 10px; color: var(--muted); display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .tx-row .tx-meta-tag { padding: 1px 6px; border-radius: 6px; background: rgba(255,255,255,0.05); }
  .tx-row .tx-meta-tag.debt { color: var(--red); background: var(--red-soft); }
  .tx-row .tx-meta-tag.account { color: var(--blue); background: rgba(52,152,219,0.12); }
  .tx-row .tx-amt { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: var(--text); }
  .tx-row .delete-btn { margin-left: 4px; }

  /* ── BUTTONS ──────────────────────── */
  .btn {
    padding: 10px 16px; border-radius: 10px; border: none; cursor: pointer;
    font-family: inherit; font-size: 12px; font-weight: 600;
    transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover, .btn-primary:active { background: #5f4fd8; }
  .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--card-hover); color: #fff; }
  .btn-danger { background: var(--red-soft); color: var(--red); border: 1px solid rgba(231,76,60,0.3); }
  .btn-add {
    width: 100%; padding: 11px; border-radius: 10px;
    border: 1.5px dashed var(--border-strong);
    background: transparent; color: var(--text-dim);
    font-family: inherit; font-size: 12px; font-weight: 600;
    cursor: pointer; margin-top: 10px; transition: all 0.15s;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

  .delete-btn {
    background: transparent; border: none; color: var(--muted-2);
    cursor: pointer; padding: 4px 6px; border-radius: 6px;
    font-size: 13px; transition: all 0.15s;
  }
  .delete-btn:hover { color: var(--red); background: var(--red-soft); }

  /* ── TOTAL ROW ──────────────────────── */
  .total-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0 4px; margin-top: 6px;
    border-top: 1.5px solid var(--border-strong);
  }
  .total-label { font-size: 13px; font-weight: 700; }
  .total-val { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }

  /* ── DAY GRID ──────────────────────── */
  .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 14px; }
  .day-btn {
    padding: 9px 2px; border-radius: 9px;
    border: 1.5px solid var(--border);
    cursor: pointer; background: var(--card);
    color: var(--muted);
    font-size: 12px; font-family: 'JetBrains Mono', monospace;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    transition: all 0.15s; font-weight: 500;
  }
  .day-btn.has-data {
    border-color: rgba(108,92,231,0.35);
    color: #b0a6f5; background: var(--accent-soft);
  }
  .day-btn.active {
    border-color: var(--accent);
    background: rgba(108,92,231,0.25);
    color: #fff; font-weight: 700;
    box-shadow: 0 2px 10px rgba(108,92,231,0.2);
  }
  .day-btn.today {
    border-color: var(--teal);
  }
  .day-amt { font-size: 8px; color: var(--accent); font-weight: 600; }

  /* ── DAY EDITOR ──────────────────────── */
  .day-editor {
    background: linear-gradient(135deg, rgba(108,92,231,0.08), rgba(108,92,231,0.03));
    border: 1px solid rgba(108,92,231,0.2);
    border-radius: 12px; padding: 16px; margin-bottom: 12px;
  }
  .day-editor-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .cat-item { display: flex; flex-direction: column; gap: 4px; }
  .cat-item label {
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .cat-item .amt-input { width: 100%; }

  /* ── PROGRESS BARS ──────────────────────── */
  .progress-bar {
    height: 7px; background: rgba(255,255,255,0.06);
    border-radius: 4px; overflow: hidden; margin-top: 6px;
  }
  .progress-fill {
    height: 100%; border-radius: 4px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-fill.green { background: linear-gradient(90deg, var(--green), #2ecc71); }
  .progress-fill.yellow { background: linear-gradient(90deg, var(--yellow), #f1c40f); }
  .progress-fill.red { background: linear-gradient(90deg, var(--red), #c0392b); }
  .progress-fill.accent { background: linear-gradient(90deg, var(--accent), #8e7cef); }
  .progress-fill.teal { background: linear-gradient(90deg, var(--teal), #16a085); }

  /* ── BUDGET CARDS ──────────────────────── */
  .budget-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; margin-bottom: 8px;
  }
  .budget-card.warning { border-color: rgba(243,156,18,0.4); background: var(--yellow-soft); }
  .budget-card.over { border-color: rgba(231,76,60,0.4); background: var(--red-soft); }
  .budget-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .budget-name { font-size: 12px; font-weight: 600; }
  .budget-nums { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

  /* ── DEBT CARDS ──────────────────────── */
  .debt-card {
    background: var(--purple-soft);
    border: 1px solid rgba(155,89,182,0.2);
    border-radius: 12px; padding: 14px; margin-bottom: 10px;
  }
  .debt-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; }
  .debt-name-input {
    background: transparent; border: none; color: #c9b8f5;
    font-size: 14px; font-weight: 700; font-family: inherit;
    outline: none; width: 100%; padding: 2px 4px; border-radius: 4px;
  }
  .debt-name-input:focus { background: rgba(155,89,182,0.15); }
  .debt-stats { display: flex; justify-content: space-between; font-size: 11px; margin-top: 10px; }
  .debt-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .debt-grid .amt-input { width: 100%; }
  .debt-field-label { font-size: 9px; color: var(--muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── GOAL CARDS ──────────────────────── */
  .goal-card {
    background: var(--teal-soft);
    border-left: 3px solid var(--teal);
    border-radius: 0 12px 12px 0; padding: 14px; margin-bottom: 10px;
  }
  .goal-card.debt { background: var(--red-soft); border-left-color: var(--red); }
  .goal-name-input {
    background: transparent; border: none; color: #fff;
    font-size: 14px; font-weight: 700; font-family: inherit;
    outline: none; width: 100%; margin-bottom: 8px;
  }

  /* ── CHARTS ──────────────────────── */
  .bar-chart {
    display: flex; align-items: flex-end; gap: 4px;
    height: 120px; padding: 0 2px; margin-top: 4px;
  }
  .bar-group { flex: 1; display: flex; gap: 1px; align-items: flex-end; height: 100%; }
  .bar { flex: 1; border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.4s cubic-bezier(0.4,0,0.2,1); }
  .bar-labels { display: flex; gap: 4px; margin-top: 6px; padding: 0 2px; }
  .bar-label {
    flex: 1; text-align: center; font-size: 9px;
    color: var(--muted); font-family: 'JetBrains Mono', monospace;
  }
  .chart-legend { display: flex; gap: 12px; margin-bottom: 8px; font-size: 10px; }
  .chart-legend span { display: flex; align-items: center; gap: 4px; color: var(--text-dim); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  .cat-breakdown { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .cat-breakdown-name { width: 82px; font-size: 11px; color: var(--text-dim); text-align: right; flex-shrink: 0; }
  .cat-breakdown-bar { flex: 1; height: 14px; background: rgba(255,255,255,0.04); border-radius: 3px; overflow: hidden; }
  .cat-breakdown-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
  .cat-breakdown-val { width: 58px; font-size: 10px; color: var(--text); text-align: right; font-family: 'JetBrains Mono', monospace; }

  /* ── INSIGHT CARDS ──────────────────────── */
  .insight {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; margin-bottom: 10px;
    border-left: 3px solid var(--accent);
  }
  .insight.positive { border-left-color: var(--green); background: var(--green-soft); }
  .insight.warning { border-left-color: var(--yellow); background: var(--yellow-soft); }
  .insight.critical { border-left-color: var(--red); background: var(--red-soft); }
  .insight-title { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .insight-body { font-size: 11px; color: var(--text-dim); line-height: 1.5; }

  /* ── FLOATING ACTION BUTTON (FAB) ──────────────────────── */
  .fab {
    position: fixed;
    bottom: calc(72px + env(safe-area-inset-bottom));
    right: 16px;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none; cursor: pointer;
    font-size: 24px; font-weight: 300;
    box-shadow: 0 6px 20px rgba(108,92,231,0.5), 0 2px 8px rgba(0,0,0,0.3);
    z-index: 90;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .fab:hover { transform: scale(1.05); }
  .fab:active { transform: scale(0.95); }

  /* ── MODAL ──────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 16px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg-1);
    border: 1px solid var(--border-strong);
    border-radius: 16px;
    padding: 20px;

function defaultYearData(year) {

// PERSISTENCE

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
    const sub = document.getElementById("subtitle");
    if (sub) sub.textContent = `Saved • ${new Date().toLocaleTimeString()}`;
  } catch(e) { console.error(e); toast("Save failed", true); }
}

async function load() {
  try {
    const rawV4 = localStorage.getItem(STORAGE_KEY);
    if (rawV4) {
      const parsed = JSON.parse(rawV4);
      DATA = Object.assign(defaultData(), parsed);
      ensureAccountsAndDebtsFlags();
      currentYear = DATA.currentYear || CURRENT_YEAR;
      if (!DATA.years[currentYear]) DATA.years[currentYear] = defaultYearData(currentYear);
      return;
    }
    const rawV3 = localStorage.getItem(LEGACY_KEY);
    if (rawV3) {
      const parsed = JSON.parse(rawV3);
      await migrateV3ToV4(parsed);
      return;
    }
  } catch(e) { console.error("Load error", e); toast("Could not load saved data", true); }
}

function ensureAccountsAndDebtsFlags() {
  DATA.debts = (DATA.debts || []).map(d => ({
    ...d,
    isPaymentMethod: d.isPaymentMethod !== undefined
      ? d.isPaymentMethod
      : !/sister|loan|family|friend/i.test(d.name || "")
  }));
  DATA.accounts = (DATA.accounts || []).map(a => ({
    ...a,
    autoSync: a.autoSync !== undefined ? a.autoSync : true
  }));
}

// ═══════════════════════════════════════════════════════════════
// MIGRATION (v3 → v4)
// ═══════════════════════════════════════════════════════════════
async function migrateV3ToV4(v3) {
  const accounts = v3.accounts && v3.accounts.length ? v3.accounts : defaultData().accounts;
  const defaultAcctId = accounts.find(a => /checking/i.test(a.name))?.id || accounts[0].id;
  const choice = await askDefaultAccountModal(accounts, defaultAcctId);
  const spendAcctId = choice || defaultAcctId;

  const nd = defaultData();
  nd.currentYear = v3.currentYear || CURRENT_YEAR;
  nd.debts = (v3.debts || nd.debts).map(d => ({
    id: d.id, name: d.name || "Debt",
    balance: Number(d.balance) || 0,
    minPay: Number(d.minPay) || 0,
    interestRate: Number(d.interestRate) || 0,
    isPaymentMethod: !/sister|loan|family|friend/i.test(d.name || "")
  }));
  nd.goals = (v3.goals || nd.goals).map(g => ({ ...g }));
  nd.accounts = accounts.map(a => ({
    id: a.id, name: a.name, type: a.type || "bank",
    balance: Number(a.balance) || 0,
    autoSync: a.autoSync !== undefined ? a.autoSync : true
  }));
  nd.lastBackup = v3.lastBackup || null;
  nd.years = {};

  for (const yStr in (v3.years || {})) {
    const y = Number(yStr);
    const oy = v3.years[yStr];
    const ny = {
      variableCategories: oy.variableCategories ? [...oy.variableCategories] : defaultYearData(y).variableCategories,
      fixedCategories: oy.fixedCategories ? [...oy.fixedCategories] : defaultYearData(y).fixedCategories,
      incomeCategories: oy.incomeCategories ? [...oy.incomeCategories] : defaultYearData(y).incomeCategories,
      budgets: oy.budgets ? { ...oy.budgets } : {},
      months: {}
    };
    ny.variableCategories.forEach(c => { if (ny.budgets[c] === undefined) ny.budgets[c] = 0; });

    for (let m = 0; m < 12; m++) {
      const om = oy.months?.[m] || {};
      const txs = [];
      const days = DAYS_IN_MONTH(y, m);

      // Daily expenses
      for (let d = 0; d < days; d++) {
        const day = om.daily?.[d] || { items: {}, notes: "" };
        for (const cat in (day.items || {})) {
          const amt = Number(day.items[cat]) || 0;
          if (amt > 0) {
            txs.push({
              id: uid("tx"), type: "expense",
              date: toISO(y, m, d),
              amount: amt, category: cat,
              paidWith: { kind: "account", id: spendAcctId },
              note: day.notes || "",
              ts: new Date(y, m, d + 1).toISOString()
            });
          }
        }
      }

      // Fixed
      for (const cat in (om.fixed || {})) {
        const amt = Number(om.fixed[cat]) || 0;
        if (amt > 0) {
          txs.push({
            id: uid("tx"), type: "fixed",
            date: toISO(y, m, 0),
            amount: amt, category: cat,
            paidWith: { kind: "account", id: spendAcctId },
            note: "",
            ts: new Date(y, m, 1).toISOString()
          });
        }
      }

      // Income
      for (const cat in (om.income || {})) {
        const amt = Number(om.income[cat]) || 0;
        if (amt > 0) {
          txs.push({
            id: uid("tx"), type: "income",
            date: toISO(y, m, 0),
            amount: amt, category: cat,
            receivedTo: spendAcctId,
            note: "",
            ts: new Date(y, m, 1).toISOString()
          });
        }
      }

      // Debt payments
      for (const debtId in (om.debtPay || {})) {
        const amt = Number(om.debtPay[debtId]) || 0;
        if (amt > 0) {
          txs.push({
            id: uid("tx"), type: "debtPayment",
            date: toISO(y, m, 0),
            amount: amt, debtId,
            paidWith: { kind: "account", id: spendAcctId },
            note: "",
            ts: new Date(y, m, 1).toISOString()
          });
        }
      }

      ny.months[m] = {
        transactions: txs,
        savings: om.savings ? { target: Number(om.savings.target)||0, actual: Number(om.savings.actual)||0 } : { target: 0, actual: 0 }
      };
    }
    nd.years[y] = ny;
  }

  if (!nd.years[CURRENT_YEAR]) nd.years[CURRENT_YEAR] = defaultYearData(CURRENT_YEAR);
  DATA = nd;
  currentYear = DATA.currentYear || CURRENT_YEAR;
  save();
  toast("Migrated to v4 — your data is safe");
}

function askDefaultAccountModal(accounts, defaultId) {
  return new Promise(resolve => {

    document.getElementById("modal-content").innerHTML = `

      </p>

      </p>

      <select class="select-input" id="mig-acct" style="width:100%">${opts}</select>

  });
}

// ═══════════════════════════════════════════════════════════════
// SIDE-EFFECTS ENGINE
// ═══════════════════════════════════════════════════════════════
function getAccount(id) { return DATA.accounts.find(a => a.id === id); }
function getDebt(id) { return DATA.debts.find(d => d.id === id); }

// Applies a transaction's effect to accounts/debts. sign=+1 when adding, -1 when removing.
// Respects account.autoSync (if false, that account's balance is NOT auto-touched).
function applyTxSideEffects(tx, sign) {
  if (!tx) return;
  const amt = (Number(tx.amount) || 0) * sign;
  if (tx.type === "expense" || tx.type === "fixed") {
    if (!tx.paidWith) return;
    if (tx.paidWith.kind === "account") {
      const acc = getAccount(tx.paidWith.id);
      if (acc && acc.autoSync !== false) acc.balance = (Number(acc.balance)||0) - amt;
    } else if (tx.paidWith.kind === "debt") {
      const d = getDebt(tx.paidWith.id);
      if (d) d.balance = (Number(d.balance)||0) + amt;
    }
  } else if (tx.type === "income") {
    const acc = getAccount(tx.receivedTo);
    if (acc && acc.autoSync !== false) acc.balance = (Number(acc.balance)||0) + amt;
  } else if (tx.type === "debtPayment") {
    if (tx.paidWith?.kind === "account") {
      const acc = getAccount(tx.paidWith.id);
      if (acc && acc.autoSync !== false) acc.balance = (Number(acc.balance)||0) - amt;
    }
    const d = getDebt(tx.debtId);
    if (d) d.balance = Math.max(0, (Number(d.balance)||0) - amt);
  }
}

function addTransaction(tx, m) {
  const month = mo(m ?? parseISO(tx.date).m);
  tx.id = tx.id || uid("tx");
  tx.ts = tx.ts || new Date().toISOString();
  month.transactions.push(tx);
  applyTxSideEffects(tx, +1);
  DATA.lastUsedPaidWith = tx.paidWith || (tx.receivedTo ? { kind: "account", id: tx.receivedTo } : DATA.lastUsedPaidWith);
  save();
}

function updateTransaction(txId, patch) {
  const { tx, month } = findTx(txId);
  if (!tx) return;
  applyTxSideEffects(tx, -1);
  Object.assign(tx, patch);
  applyTxSideEffects(tx, +1);
  save();
}

function deleteTransaction(txId) {
  const { tx, month, idx } = findTx(txId);
  if (!tx) return;
  applyTxSideEffects(tx, -1);
  month.transactions.splice(idx, 1);
  save();
}

function findTx(txId) {
  for (const yStr in DATA.years) {
    const y = DATA.years[yStr];
    for (const mStr in y.months) {
      const month = y.months[mStr];
      const idx = month.transactions.findIndex(t => t.id === txId);
      if (idx >= 0) return { tx: month.transactions[idx], month, idx, year: Number(yStr), m: Number(mStr) };
    }
  }
  return {};
}

// Set the single-tx-per-(month,category,type) amount. Used for fixed/income where UX is one input.
function setMonthCategoryAmount(type, m, category, newAmount, paidWithOrReceivedTo) {
  const month = mo(m);
  const existing = month.transactions.find(t => t.type === type && t.category === category);
  if (newAmount <= 0 || !newAmount) {
    if (existing) {
      applyTxSideEffects(existing, -1);
      month.transactions = month.transactions.filter(t => t !== existing);
    }
  } else if (existing) {
    applyTxSideEffects(existing, -1);
    existing.amount = newAmount;
    if (type === "income") existing.receivedTo = paidWithOrReceivedTo;
    else existing.paidWith = paidWithOrReceivedTo;
    applyTxSideEffects(existing, +1);
  } else {
    const tx = {
      id: uid("tx"), type,
      date: toISO(currentYear, m, 0),
      amount: newAmount, category,
      note: "",
      ts: new Date().toISOString()
    };
    if (type === "income") tx.receivedTo = paidWithOrReceivedTo;
    else tx.paidWith = paidWithOrReceivedTo;
    month.transactions.push(tx);
    applyTxSideEffects(tx, +1);
  }
  save();
}

// Set single-tx-per-(month,debtId) amount for debt payments.
function setMonthDebtPayment(m, debtId, newAmount, paidWith) {
  const month = mo(m);
  const existing = month.transactions.find(t => t.type === "debtPayment" && t.debtId === debtId);
  if (!newAmount || newAmount <= 0) {
    if (existing) {
      applyTxSideEffects(existing, -1);
      month.transactions = month.transactions.filter(t => t !== existing);
    }
  } else if (existing) {
    applyTxSideEffects(existing, -1);
    existing.amount = newAmount;
    existing.paidWith = paidWith || existing.paidWith;
    applyTxSideEffects(existing, +1);
  } else {
    const tx = {
      id: uid("tx"), type: "debtPayment",
      date: toISO(currentYear, m, 0),
      amount: newAmount, debtId,
      paidWith: paidWith || DATA.lastUsedPaidWith || { kind: "account", id: DATA.accounts[0]?.id },
      note: "",
      ts: new Date().toISOString()
    };
    month.transactions.push(tx);
    applyTxSideEffects(tx, +1);
  }
  save();
}

// ═══════════════════════════════════════════════════════════════
// BACKUP / RESTORE
// ═══════════════════════════════════════════════════════════════
function exportData() {
  const blob = new Blob([JSON.stringify(DATA, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `finance-tracker-${new Date().toISOString().split("T")[0]}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  DATA.lastBackup = new Date().toISOString();
  save();
  toast("Backup exported");
}

// iCloud Sync — uses Web Share API on iOS so the user can send the file
// straight into the Files app → iCloud Drive.  On desktop, triggers a download
// that the user drops into ~/Library/Mobile Documents/com~apple~CloudDocs/.
async function syncToICloud() {
  const payload = JSON.stringify(DATA, null, 2);
  const filename = "finance-tracker-sync.json";
  const file = new File([payload], filename, { type: "application/json" });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        files: [file],
        title: "Finance Tracker sync",
        text: "Tap 'Save to Files' → iCloud Drive → overwrite the existing finance-tracker-sync.json"
      });
      DATA.lastSyncAt = new Date().toISOString();
      DATA.lastSyncDirection = "up";
      save();
      toast("Saved to iCloud — keep filename the same next time");
      renderSettingsSyncStatus();
      return;
    } catch (err) {
      if (err.name === "AbortError") return;
      console.warn("share failed, falling back to download", err);
    }
  }

  const blob = new Blob([payload], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  DATA.lastSyncAt = new Date().toISOString();
  DATA.lastSyncDirection = "up";
  save();
  toast("Downloaded — move it into iCloud Drive");
  renderSettingsSyncStatus();
}

function syncFromICloudPick(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const parsed = JSON.parse(e.target.result);
      const isV4 = parsed.schemaVersion === 4 || (parsed.years && Object.values(parsed.years)[0]?.months?.[0]?.transactions);
      const isV3 = parsed.years && parsed.debts && Object.values(parsed.years)[0]?.months?.[0]?.daily;
      if (!isV4 && !isV3) throw new Error("Not a Finance Tracker backup");

      const theirStamp = parsed.lastSyncAt || parsed.lastBackup;
      const ourStamp = DATA.lastSyncAt || DATA.lastBackup;
      if (theirStamp && ourStamp && new Date(theirStamp) < new Date(ourStamp)) {
        if (!(await appConfirm(
          `The iCloud file is OLDER than this device's data.\n\n` +
          `iCloud: ${new Date(theirStamp).toLocaleString()}\n` +
          `Here:  ${new Date(ourStamp).toLocaleString()}\n\n` +
          `Overwrite anyway?`
        ))) return;
      }

      if (isV4) {
        DATA = Object.assign(defaultData(), parsed);
        ensureAccountsAndDebtsFlags();
        currentYear = DATA.currentYear || CURRENT_YEAR;
      } else {
        await migrateV3ToV4(parsed);
      }
      DATA.lastSyncAt = new Date().toISOString();
      DATA.lastSyncDirection = "down";
      save();
      render();
      toast("Synced from iCloud");
    } catch (err) {
      console.error(err);
      toast("Couldn't read file: " + err.message, true);
    }
  };
  reader.readAsText(file);
}

function renderSettingsSyncStatus() {
  const el = document.getElementById("sync-status");
  if (!el) return;
  if (!DATA.lastSyncAt) {
    el.textContent = "Never synced on this device";
    return;
  }
  const when = new Date(DATA.lastSyncAt);
  const dir = DATA.lastSyncDirection === "up" ? "→ iCloud" : "← iCloud";
  el.textContent = `Last sync: ${when.toLocaleString()} ${dir}`;
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed || typeof parsed !== "object") throw new Error("Not an object");
      // Accept both v3 and v4 backups
      const isV4 = parsed.schemaVersion === 4 || (parsed.years && Object.values(parsed.years)[0]?.months?.[0]?.transactions);
      const isV3Shape = parsed.years && parsed.debts && Object.values(parsed.years)[0]?.months?.[0]?.daily;
      if (!isV4 && !isV3Shape) throw new Error("Unrecognised backup format");
      if (!(await appConfirm("This will replace all current data. Continue?"))) return;
      if (isV4) {
        DATA = Object.assign(defaultData(), parsed);
        ensureAccountsAndDebtsFlags();
        currentYear = DATA.currentYear || CURRENT_YEAR;
        save();
        render();
        toast("Data imported");
      } else {
        await migrateV3ToV4(parsed);
        render();
      }
    } catch (err) {
      console.error(err);
      toast("Invalid backup: " + err.message, true);
    }
  };
  reader.readAsText(file);
}

function restoreV3Snapshot() {
  const raw = localStorage.getItem(LEGACY_KEY);
  if (!raw) { toast("No v3 snapshot found", true); return; }
  appConfirm("Discard current v4 data and restore your pre-upgrade v3 snapshot?").then(async ok => {
    if (!ok) return;
    localStorage.removeItem(STORAGE_KEY);
    await load();
    render();
    toast("v3 snapshot restored");
  });
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
const cur = () => DATA.currency || "$";
function fmt(v, signed = false) {
  if (v === null || v === undefined || isNaN(v)) return cur() + "0";
  const abs = Math.abs(Math.round(v));
  const str = cur() + abs.toLocaleString();
  if (signed) return v < 0 ? "-" + str : (v > 0 ? "+" + str : str);
  return v < 0 ? "-" + str : str;
}
function fmtColor(v) { return v >= 0 ? "var(--green)" : "var(--red)"; }
function yd() { return DATA.years[currentYear] || (DATA.years[currentYear] = defaultYearData(currentYear)); }
function mo(m) {
  if (!yd().months[m]) yd().months[m] = { transactions: [], savings: { target:0, actual:0 } };
  const mm = yd().months[m];
  if (!mm.transactions) mm.transactions = [];
  if (!mm.savings) mm.savings = { target: 0, actual: 0 };
  return mm;
}
function escapeHTML(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

function toast(msg, isErr) {
  const t = document.getElementById("toast");
  t.innerHTML = `${icon(isErr ? "alert-circle" : "check")} <span>${escapeHTML(String(msg))}</span>`;
  t.className = "toast show" + (isErr ? " error" : "");
  setTimeout(() => t.className = "toast" + (isErr ? " error" : ""), 1800);
}

async function appPrompt(message, defaultVal = "") {
  return new Promise(resolve => {
    document.getElementById("modal-content").innerHTML = `
      <div class="modal-title">
        <span><i data-icon="edit"></i> Input</span>
        <button class="modal-close" onclick="window.__promptResolve(null)" aria-label="Close"><i data-icon="close"></i></button>
      </div>
      <p class="note" style="margin-bottom:12px">${escapeHTML(message)}</p>
      <input type="text" class="text-input" id="custom-prompt-input" value="${escapeHTML(defaultVal)}"
        onkeydown="if(event.key==='Enter') window.__promptResolve(this.value)" />
      <div class="modal-actions" style="margin-top:16px">
        <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="window.__promptResolve(null)">Cancel</button>

    `;

  });
}

async function appConfirm(message) {

    document.getElementById("modal-content").innerHTML = `

// DERIVED QUERIES
// ═══════════════════════════════════════════════════════════════
function monthTxs(m) { return mo(m).transactions || []; }
function monthSumByType(m, type) {
  return monthTxs(m).filter(t => t.type === type).reduce((s, t) => s + (Number(t.amount)||0), 0);
}
function dailyCatSums(m, d) {
  const out = {};
  yd().variableCategories.forEach(c => out[c] = 0);
  const dateStr = toISO(currentYear, m, d);
  monthTxs(m).forEach(t => {
    if (t.type === "expense" && t.date === dateStr) {
      out[t.category] = (out[t.category] || 0) + (Number(t.amount)||0);
    }
  });
  return out;
}
function dailyTotal(m, d) {
  const dateStr = toISO(currentYear, m, d);
  return monthTxs(m).filter(t => t.type === "expense" && t.date === dateStr)
    .reduce((s, t) => s + (Number(t.amount)||0), 0);
}
function dailyTxs(m, d) {
  const dateStr = toISO(currentYear, m, d);
  return monthTxs(m).filter(t => t.type === "expense" && t.date === dateStr)
    .sort((a,b) => new Date(b.ts) - new Date(a.ts));
}
function monthFixedByCat(m) {
  const out = {}; yd().fixedCategories.forEach(c => out[c] = { amount: 0, paidWith: null, txId: null });
  monthTxs(m).forEach(t => {
    if (t.type === "fixed") {
      out[t.category] = out[t.category] || { amount: 0, paidWith: null, txId: null };
      out[t.category].amount = (out[t.category].amount || 0) + (Number(t.amount)||0);
      out[t.category].paidWith = t.paidWith;
      out[t.category].txId = t.id;
    }
  });
  return out;
}
function monthIncomeByCat(m) {
  const out = {}; yd().incomeCategories.forEach(c => out[c] = { amount: 0, receivedTo: null, txId: null });
  monthTxs(m).forEach(t => {
    if (t.type === "income") {
      out[t.category] = out[t.category] || { amount: 0, receivedTo: null, txId: null };
      out[t.category].amount = (out[t.category].amount || 0) + (Number(t.amount)||0);
      out[t.category].receivedTo = t.receivedTo;
      out[t.category].txId = t.id;
    }
  });
  return out;
}
function monthDebtPayByDebt(m) {
  const out = {};
  DATA.debts.forEach(d => out[d.id] = { amount: 0, paidWith: null, txId: null });
  monthTxs(m).forEach(t => {
    if (t.type === "debtPayment") {
      out[t.debtId] = out[t.debtId] || { amount: 0, paidWith: null, txId: null };
      out[t.debtId].amount = (out[t.debtId].amount || 0) + (Number(t.amount)||0);
      out[t.debtId].paidWith = t.paidWith;
      out[t.debtId].txId = t.id;
    }
  });
  return out;
}

function getMonthData(m) {
  const income = monthSumByType(m, "income");
  const fixed = monthSumByType(m, "fixed");
  const variable = monthSumByType(m, "expense");
  const debtPaid = monthSumByType(m, "debtPayment");
  const expenses = fixed + variable;
  const balance = income - expenses;
  const catTotals = {};
  yd().variableCategories.forEach(c => catTotals[c] = 0);
  monthTxs(m).forEach(t => {
    if (t.type === "expense") catTotals[t.category] = (catTotals[t.category] || 0) + (Number(t.amount)||0);
  });
  return { income, fixed, variable, expenses, balance, debtPaid, catTotals };
}

function getAnnual() {
  let totInc=0, totExp=0, totDebtPaid=0, totMonthlySaved=0, totFixed=0, totVar=0;
  const catTotals = {};
  for (let m = 0; m < 12; m++) {
    const md = getMonthData(m);
    totInc += md.income; totExp += md.expenses; totDebtPaid += md.debtPaid;
    totFixed += md.fixed; totVar += md.variable;
    totMonthlySaved += (mo(m).savings?.actual || 0);
    Object.keys(md.catTotals).forEach(c => { catTotals[c] = (catTotals[c] || 0) + md.catTotals[c]; });
  }
  const totGoalSaved = (DATA.goals || []).reduce((s, g) => s + (Number(g.saved) || 0), 0);
  const totSaved = totMonthlySaved + totGoalSaved;
  const totalDebt = DATA.debts.reduce((s,d) => s + (Number(d.balance)||0), 0);
  const debtRemaining = totalDebt;
  const totalAssets = DATA.accounts.reduce((s,a) => s + (Number(a.balance)||0), 0);
  const netWorth = totalAssets - debtRemaining;
  return { totInc, totExp, balance: totInc - totExp, totDebtPaid, totSaved, totMonthlySaved, totGoalSaved, totalDebt, debtRemaining, totFixed, totVar, catTotals, netWorth, totalAssets };
}

// ═══════════════════════════════════════════════════════════════
// INPUT HANDLERS
// ═══════════════════════════════════════════════════════════════
function onAmtBlur(el, key) {
  const val = parseFloat(el.value) || 0;
  el.value = val || "";
  const parts = key.split("|");
  const type = parts[0];

  if (type === "savings") {
    mo(parts[1]).savings[parts[2]] = val;
    save();
  } else if (type === "debt") {
    const d = DATA.debts.find(x => x.id === parts[1]);
    if (d) d[parts[2]] = val;
    save();
  } else if (type === "goal") {
    const g = DATA.goals.find(x => x.id === parts[1]);
    if (g) g[parts[2]] = val;
    save();
  } else if (type === "budget") {
    yd().budgets[parts[1]] = val;
    save();
  } else if (type === "account") {
    const a = DATA.accounts.find(x => x.id === parts[1]);
    if (a) a[parts[2]] = val;
    save();
  } else if (type === "fixed") {
    const m = parseInt(parts[1]), cat = parts[2];
    const cur = monthFixedByCat(m)[cat] || {};
    const pw = cur.paidWith || DATA.lastUsedPaidWith || defaultPaidWith();
    setMonthCategoryAmount("fixed", m, cat, val, pw);
  } else if (type === "income") {
    const m = parseInt(parts[1]), cat = parts[2];
    const cur = monthIncomeByCat(m)[cat] || {};
    const to = cur.receivedTo || (DATA.lastUsedPaidWith?.kind === "account" ? DATA.lastUsedPaidWith.id : DATA.accounts.find(a=>/checking/i.test(a.name))?.id || DATA.accounts[0]?.id);
    setMonthCategoryAmount("income", m, cat, val, to);
  } else if (type === "debtPay") {
    const m = parseInt(parts[1]), debtId = parts[2];
    const cur = monthDebtPayByDebt(m)[debtId] || {};
    const pw = cur.paidWith || DATA.lastUsedPaidWith || defaultPaidWith();
    setMonthDebtPayment(m, debtId, val, pw);
  }
  refreshTotals();
}

function onTextBlur(el, key) {
  const parts = key.split("|");
  const type = parts[0];
  if (type === "debtName") {
    const d = DATA.debts.find(x => x.id === parts[1]);
    if (d) d.name = el.value;
  } else if (type === "goalName") {
    const g = DATA.goals.find(x => x.id === parts[1]);
    if (g) g.name = el.value;
  } else if (type === "accountName") {
    const a = DATA.accounts.find(x => x.id === parts[1]);
    if (a) a.name = el.value;
  }
  save();
}

function defaultPaidWith() {
  const checking = DATA.accounts.find(a => /checking/i.test(a.name));
  return { kind: "account", id: (checking?.id) || DATA.accounts[0]?.id };
}

function changeFixedPaidWith(m, cat, pw) {
  const cur = monthFixedByCat(m)[cat] || {};
  if ((cur.amount || 0) <= 0) { DATA.lastUsedPaidWith = pw; save(); return; }
  setMonthCategoryAmount("fixed", m, cat, cur.amount, pw);
  refreshTotals();
}
function changeIncomeReceivedTo(m, cat, pw) {
  const cur = monthIncomeByCat(m)[cat] || {};
  const accId = pw?.kind === "account" ? pw.id : (pw?.id || null);
  if ((cur.amount || 0) <= 0) { if (accId) DATA.lastUsedPaidWith = { kind: "account", id: accId }; save(); return; }
  setMonthCategoryAmount("income", m, cat, cur.amount, accId);
  refreshTotals();
}
function changeDebtPayPaidWith(m, debtId, pw) {
  const cur = monthDebtPayByDebt(m)[debtId] || {};
  if ((cur.amount || 0) <= 0) { DATA.lastUsedPaidWith = pw; save(); return; }
  setMonthDebtPayment(m, debtId, cur.amount, pw);
  refreshTotals();
}

function refreshTotals() {
  const app = document.getElementById("app");
  const inLock = document.body.classList.contains("kb-lock");
  const scrollTop = inLock && app ? app.scrollTop : window.scrollY;
  render();
  if (inLock && app) app.scrollTop = scrollTop;
  else window.scrollTo(0, scrollTop);
}

async function addCategory(type) {
  const promptText = { variable: "New variable expense category:", fixed: "New fixed expense category:", income: "New income source:" }[type];
  const name = await appPrompt(promptText);
  if (!name || !name.trim()) return;
  const key = { variable: "variableCategories", fixed: "fixedCategories", income: "incomeCategories" }[type];
  if (yd()[key].includes(name.trim())) { toast("Already exists", true); return; }
  yd()[key].push(name.trim());
  if (type === "variable") yd().budgets[name.trim()] = 0;
  save(); render(); toast(`Added "${name.trim()}"`);
}

async function renameCategory(type, oldName, newName) {
  if (!newName || !newName.trim() || newName.trim() === oldName) { render(); return; }
  const key = { variable: "variableCategories", fixed: "fixedCategories", income: "incomeCategories" }[type];
  const arr = yd()[key];
  const idx = arr.indexOf(oldName);
  if (idx === -1) return;
  if (arr.includes(newName.trim())) { toast("Name already exists", true); render(); return; }
  arr[idx] = newName.trim();
  if (type === "variable") {
    yd().budgets[newName.trim()] = yd().budgets[oldName] || 0;
    delete yd().budgets[oldName];
  }
  // Retag transactions in this year (fast pass)
  Object.values(yd().months).forEach(mm => {
    mm.transactions.forEach(t => {
      if ((type === "variable" && t.type === "expense" && t.category === oldName) ||
          (type === "fixed" && t.type === "fixed" && t.category === oldName) ||
          (type === "income" && t.type === "income" && t.category === oldName)) {
        t.category = newName.trim();
      }
    });
  });
  save(); render(); toast("Renamed");
}

async function deleteCategory(type, name) {
  if (!(await appConfirm(`Delete "${name}"? All transactions using this category will be removed.`))) return;
  const key = { variable: "variableCategories", fixed: "fixedCategories", income: "incomeCategories" }[type];
  const typeKey = { variable: "expense", fixed: "fixed", income: "income" }[type];
  yd()[key] = yd()[key].filter(c => c !== name);
  if (type === "variable") delete yd().budgets[name];
  Object.values(yd().months).forEach(mm => {
    const keep = [], drop = [];
    mm.transactions.forEach(t => (t.type === typeKey && t.category === name ? drop : keep).push(t));
    drop.forEach(t => applyTxSideEffects(t, -1));
    mm.transactions = keep;
  });
  save(); render(); toast("Deleted");
}

async function addDebt() {
  const name = await appPrompt("Debt name:");
  if (!name || !name.trim()) return;
  DATA.debts.push({ id: uid("d"), name: name.trim(), balance: 0, minPay: 0, interestRate: 0, isPaymentMethod: true });
  save(); render(); toast("Debt added");
}
async function deleteDebt(id) {
  if (!(await appConfirm("Delete this debt? All associated payments will be removed."))) return;
  // Drop tx paying this debt or paid via this debt
  for (const yStr in DATA.years) {
    for (const mStr in DATA.years[yStr].months) {
      const mm = DATA.years[yStr].months[mStr];
      const keep = [], drop = [];
      mm.transactions.forEach(t => {
        const kill = (t.type === "debtPayment" && t.debtId === id) ||
                     (t.paidWith && t.paidWith.kind === "debt" && t.paidWith.id === id);
        (kill ? drop : keep).push(t);
      });
      drop.forEach(t => applyTxSideEffects(t, -1));
      mm.transactions = keep;
    }
  }
  DATA.debts = DATA.debts.filter(d => d.id !== id);
  save(); render(); toast("Deleted");
}

function amtInput(value, key, placeholder = "0") {

    value="${value || ""}" placeholder="${placeholder}"
    onblur="onAmtBlur(this,'${key}')" onfocus="this.select()"/>`;

function renderMonthTabs(m, color = "var(--accent)") {
  return `<div class="tab-row-scroll">${MONTHS_S.map((mn, i) => `
    <button class="tab ${i === m ? "active" : ""}"
      ${i === m ? `style="background:${color};box-shadow:0 2px 8px ${color}40"` : ""}
      onclick="switchMonth(${i})">${mn}</button>`).join("")}</div>`;

function renderYearSelector() {
  const years = Object.keys(DATA.years).map(Number).sort();
  const maxY = Math.max(...years, CURRENT_YEAR);
  const minY = Math.min(...years, CURRENT_YEAR);
  const options = [];
  for (let y = minY - 1; y <= maxY + 1; y++) options.push(y);
  return `<select class="select-input" style="padding:6px 26px 6px 10px;font-size:13px" onchange="switchYear(this.value)">
    ${options.map(y => `<option value="${y}" ${y === currentYear ? "selected" : ""}>${y}</option>`).join("")}
  </select>`;
}

// Small balance strip — quick reference for accounts + credit-card debts
function renderBalanceStrip() {
  const chips = [];
  DATA.accounts.forEach(a => {
    const neg = (Number(a.balance) || 0) < 0 ? " negative" : "";
    chips.push(`<div class="balance-chip account${neg}">
      <span class="b-label">${accountIcon(a)} ${escapeHTML(a.name)}</span>
      <span class="b-val">${fmt(a.balance, true)}</span>
    </div>`);
  });
  DATA.debts.filter(d => d.isPaymentMethod).forEach(d => {
    chips.push(`<div class="balance-chip debt">
      <span class="b-label">${escapeHTML(d.name)}</span>
      <span class="b-val">${fmt(d.balance)}</span>
    </div>`);
  });
  return `<div class="balance-strip">${chips.join("")}</div>`;
}

// ═══════════════════════════════════════════════════════════════
// VIEW: DASHBOARD
// ═══════════════════════════════════════════════════════════════
function renderDash() {
  const a = getAnnual();
  const monthly = Array.from({length: 12}, (_, m) => getMonthData(m));
  const maxVal = Math.max(...monthly.map(m => Math.max(m.income, m.expenses)), 1);

  const bars = monthly.map(m => {
    const ih = Math.round((m.income / maxVal) * 115);
    const eh = Math.round((m.expenses / maxVal) * 115);
    return `<div class="bar-group">
      <div class="bar" style="height:${ih}px;background:var(--green)"></div>
      <div class="bar" style="height:${eh}px;background:var(--red)"></div>
    </div>`;
  }).join("");

  let cum = 0;
  const cumData = monthly.map(m => { cum += m.balance; return cum; });
  const minCum = Math.min(...cumData, 0);
  const maxCum = Math.max(...cumData, 0);
  const range = maxCum - minCum || 1;
  const cumBars = cumData.map(v => {
    const h = Math.round(((v - minCum) / range) * 100) + 4;
    return `<div style="flex:1;height:${h}px;border-radius:3px 3px 0 0;background:${v >= 0 ? "var(--accent)" : "var(--red)"};opacity:0.8;min-height:3px"></div>`;
  }).join("");

  const sortedCats = Object.entries(a.catTotals).filter(([,v]) => v > 0).sort((x,y) => y[1] - x[1]);
  const catBars = sortedCats.map(([name, val]) => {
    const pct = a.totVar > 0 ? (val / a.totVar * 100) : 0;
    return `<div class="cat-breakdown">
      <div class="cat-breakdown-name">${escapeHTML(name)}</div>
      <div class="cat-breakdown-bar"><div class="cat-breakdown-bar-fill" style="width:${pct}%;background:${colorFor(name)}"></div></div>
      <div class="cat-breakdown-val">${fmt(val)}</div>
    </div>`;
  }).join("");

  const barLabels = MONTHS_S.map(m => `<div class="bar-label">${m}</div>`).join("");

  return `
  <div class="flex justify-between items-center mb-2">
    <span class="text-muted" style="font-size:11px">Year</span>
    ${renderYearSelector()}
  </div>

  ${renderBalanceStrip()}

  <div class="kpi-grid">
    <div class="kpi" style="--accent-color:var(--green)">
      <div class="kpi-label">Income</div>
      <div class="kpi-value" style="color:var(--green)">${fmt(a.totInc)}</div>
      <div class="kpi-sub">${currentYear}</div>
    </div>
    <div class="kpi" style="--accent-color:var(--red)">
      <div class="kpi-label">Expenses</div>
      <div class="kpi-value" style="color:var(--red)">${fmt(a.totExp)}</div>
      <div class="kpi-sub">${currentYear}</div>
    </div>
    <div class="kpi" style="--accent-color:${a.balance >= 0 ? 'var(--green)' : 'var(--red)'}">
      <div class="kpi-label">Net Balance</div>
      <div class="kpi-value" style="color:${fmtColor(a.balance)}">${fmt(a.balance, true)}</div>
      <div class="kpi-sub">${a.balance >= 0 ? 'Surplus' : 'Deficit'}</div>
    </div>
    <div class="kpi" style="--accent-color:var(--purple)">
      <div class="kpi-label">Total Debt</div>
      <div class="kpi-value" style="color:var(--purple)">${fmt(a.debtRemaining)}</div>
      <div class="kpi-sub">${fmt(a.totDebtPaid)} paid this yr</div>
    </div>
    <div class="kpi" style="--accent-color:var(--teal)">
      <div class="kpi-label">Net Worth</div>
      <div class="kpi-value" style="color:${a.netWorth >= 0 ? 'var(--teal)' : 'var(--red)'}">${fmt(a.netWorth, true)}</div>
      <div class="kpi-sub">Assets − Debt</div>
    </div>
    <div class="kpi" style="--accent-color:var(--accent)">
      <div class="kpi-label">Saved</div>
      <div class="kpi-value" style="color:var(--accent)">${fmt(a.totSaved)}</div>
      <div class="kpi-sub">This year</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><div class="card-title-left">${icon("chart-bar")}Income vs Expenses</div></div>
    <div class="chart-legend">
      <span><span class="legend-dot" style="background:var(--green)"></span>Income</span>
      <span><span class="legend-dot" style="background:var(--red)"></span>Expenses</span>
    </div>
    <div class="bar-chart">${bars}</div>
    <div class="bar-labels">${barLabels}</div>
  </div>

  <div class="card">
    <div class="card-title"><div class="card-title-left">${icon("chart-line")}Cumulative Balance</div></div>
    <div class="bar-chart" style="height:100px">${cumBars}</div>
    <div class="bar-labels">${barLabels}</div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
      Ending balance: <span class="mono" style="color:${fmtColor(a.balance)};font-weight:600">${fmt(a.balance, true)}</span>
    </div>
  </div>

  ${sortedCats.length > 0 ? `<div class="card">
    <div class="card-title"><div class="card-title-left">${icon("chart-pie")}Variable Spending</div></div>
    ${catBars}
    <div class="total-row" style="padding-top:12px">
      <span class="total-label text-dim">Variable Total</span>
      <span class="total-val">${fmt(a.totVar)}</span>
    </div>
    <div class="flex justify-between" style="margin-top:6px;font-size:11px">
      <span class="text-muted">Fixed expenses</span>
      <span class="mono">${fmt(a.totFixed)}</span>
    </div>
  </div>` : ""}
  `;
}

// ═══════════════════════════════════════════════════════════════
// VIEW: DAILY  (transaction-level)
// ═══════════════════════════════════════════════════════════════
function renderDaily() {
  const m = currentMonth;
  const days = DAYS_IN_MONTH(currentYear, m);
  const vars = yd().variableCategories;
  const isCurrentMonth = currentYear === TODAY.getFullYear() && m === TODAY.getMonth();

  const dayBtns = Array.from({length: days}, (_, d) => {
    const total = dailyTotal(m, d);
    const isToday = isCurrentMonth && d === TODAY.getDate() - 1;
    let cls = "day-btn";
    if (activeDay === d) cls += " active";
    else if (total > 0) cls += " has-data";
    if (isToday) cls += " today";
    return `<button id="day-btn-${d}" class="${cls}" onclick="toggleDay(${d})">
      <span>${d + 1}</span>${total > 0 ? `<span class="day-amt">${cur()}${Math.round(total)}</span>` : ""}
    </button>`;
  }).join("");

  let editor = "";
  if (activeDay !== null) {
    const txs = dailyTxs(m, activeDay);
    const total = txs.reduce((s,t) => s + (Number(t.amount)||0), 0);

    const txRows = txs.length ? `<div class="tx-list">${txs.map(t => {
      const pw = t.paidWith;
      const pwIcon = pw ? (pw.kind === "debt" ? icon("credit-card") : icon(accountIconName(getAccount(pw.id)))) : "";
      const pwLabel = pw ? `${pwIcon} ${escapeHTML(paidWithLabel(pw))}` : "—";
      const pwClass = pw?.kind === "debt" ? "debt" : "account";
      return `<div class="tx-row">
        <span class="tx-cat-dot" style="background:${colorFor(t.category)}"></span>
        <div class="tx-main">
          <span class="tx-cat-name">${escapeHTML(t.category)}</span>
          <div class="tx-meta">
            <span class="tx-meta-tag ${pwClass}">${pwLabel}</span>
            ${t.note ? `<span>· ${escapeHTML(t.note)}</span>` : ""}
          </div>
        </div>
        <span class="tx-amt">${fmt(t.amount)}</span>
        <button class="delete-btn" onclick="handleDeleteTx('${t.id}')">${icon("trash")}</button>
      </div>`;
    }).join("")}</div>` : `<div class="empty" style="padding:18px 10px"><div style="opacity:0.6">No transactions yet — tap the button below to add one.</div></div>`;

    // Draft form
    const draft = addDraft || { amount: "", category: vars[0], paidWith: DATA.lastUsedPaidWith || defaultPaidWith(), note: "" };
    addDraft = draft;

    const catOpts = vars.map(c => `<option value="${escapeHTML(c)}" ${c === draft.category ? "selected" : ""}>${escapeHTML(c)}</option>`).join("");
    const pwVal = draft.paidWith ? `${draft.paidWith.kind}:${draft.paidWith.id}` : "";
    const pwOpts = (() => {
      const opts = [];
      opts.push(`<optgroup label="Accounts">`);
      DATA.accounts.forEach(a => opts.push(`<option value="account:${a.id}" ${pwVal === `account:${a.id}` ? "selected" : ""}>${escapeHTML(a.name)}</option>`));
      opts.push(`</optgroup>`);
      const cards = DATA.debts.filter(d => d.isPaymentMethod);
      if (cards.length) {
        opts.push(`<optgroup label="Credit Cards">`);
        cards.forEach(d => opts.push(`<option value="debt:${d.id}" ${pwVal === `debt:${d.id}` ? "selected" : ""}>${escapeHTML(d.name)}</option>`));
        opts.push(`</optgroup>`);
      }
      return opts.join("");
    })();

    editor = `<div class="day-editor fade-in">
      <div class="day-editor-title">
        <span>${MONTHS[m]} ${activeDay + 1}</span>
        <span class="mono" style="color:var(--accent)">${fmt(total)}</span>
      </div>
      ${txRows}
      <div style="margin-top:14px;padding-top:12px;border-top:1px dashed var(--border-strong)">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div>
            <label class="debt-field-label">Amount</label>
            <input type="number" inputmode="decimal" step="0.01" class="amt-input"
              style="width:100%;text-align:left" placeholder="0.00"
              value="${draft.amount || ""}"
              oninput="addDraft.amount=this.value"/>
          </div>
          <div>
            <label class="debt-field-label">Category</label>
            <select class="select-input" style="width:100%" onchange="addDraft.category=this.value">${catOpts}</select>
          </div>
        </div>
        <div style="margin-top:8px">
          <label class="debt-field-label">Paid with</label>
          <select class="select-input" style="width:100%" onchange="addDraft.paidWith=this.value?{kind:this.value.split(':')[0],id:this.value.split(':')[1]}:null">${pwOpts}</select>
        </div>
        <div style="margin-top:8px">
          <label class="debt-field-label">Note (optional)</label>
          <input type="text" class="text-input" placeholder="e.g. Loblaws weekly shop"
            value="${escapeHTML(draft.note || "")}"
            oninput="addDraft.note=this.value"/>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:10px" onclick="commitDailyDraft(${m},${activeDay})">${icon("plus")} Add Expense</button>
        <button class="btn-ghost btn" style="margin-top:8px;width:100%;justify-content:center" onclick="activeDay=null;addDraft=null;render()">Close</button>
      </div>
    </div>`;
  }

  const monthData = getMonthData(m);

  return `
  <div class="flex justify-between items-center mb-2">
    <span class="text-muted" style="font-size:11px">Year</span>
    ${renderYearSelector()}
  </div>
  ${renderMonthTabs(m, "var(--orange)")}

  <div class="card">
    <div class="card-title">
      <div class="card-title-left">${icon("calendar")}${MONTHS[m]} ${currentYear}</div>
      <span class="badge accent">${fmt(monthData.variable)}</span>
    </div>
    <p class="note">Tap a day to see its transactions · Today is highlighted in teal</p>
    <div class="day-grid">${dayBtns}</div>
    ${editor}
  </div>

  <div class="card">
    <div class="card-title"><div class="card-title-left">${icon("tag")}Categories</div></div>
    ${vars.map(c => `
      <div class="form-row">
        <input type="text" class="editable-label" value="${escapeHTML(c)}"
          style="color:${colorFor(c)};font-weight:500"
          onblur="renameCategory('variable','${escapeHTML(c)}',this.value)"
          onkeydown="if(event.key==='Enter'){this.blur();}"/>
        <button class="delete-btn" onclick="deleteCategory('variable','${escapeHTML(c)}')" title="Delete">${icon("trash")}</button>
      </div>`).join("")}
    <button class="btn-add" onclick="addCategory('variable')">${icon("plus")} Add Category</button>
  </div>

  <div class="card">
    <div class="card-title"><div class="card-title-left">${icon("chart-bar")}${MONTHS_S[m]} Summary</div></div>
    <div class="flex justify-between" style="font-size:12px;margin-bottom:6px">
      <span class="text-dim">Variable</span><span class="mono">${fmt(monthData.variable)}</span>
    </div>
    <div class="flex justify-between" style="font-size:12px;margin-bottom:6px">
      <span class="text-dim">Fixed</span><span class="mono">${fmt(monthData.fixed)}</span>
    </div>
    <div class="total-row">
      <span class="total-label text-dim">Total Expenses</span>
      <span class="total-val" style="color:var(--red)">${fmt(monthData.expenses)}</span>
    </div>
  </div>
  `;
}

function commitDailyDraft(m, d) {
  if (!addDraft) return;
  const amt = parseFloat(addDraft.amount);
  if (!amt || amt <= 0) { toast("Enter an amount", true); return; }
  if (!addDraft.category) { toast("Pick a category", true); return; }
  if (!addDraft.paidWith) { toast("Pick a payment method", true); return; }
  addTransaction({
    type: "expense",
    date: toISO(currentYear, m, d),
    amount: amt,
    category: addDraft.category,
    paidWith: addDraft.paidWith,
    note: (addDraft.note || "").trim()
  }, m);
  addDraft = { amount: "", category: addDraft.category, paidWith: addDraft.paidWith, note: "" };
  render();
  toast(`Added ${fmt(amt)}`);
}

async function handleDeleteTx(id) {
  if (!(await appConfirm("Delete this transaction?"))) return;
  deleteTransaction(id);
  render();
  toast("Deleted");
}

// ═══════════════════════════════════════════════════════════════
// VIEW: FIXED EXPENSES (recurring monthly bills — rent, subs, etc.)
// ═══════════════════════════════════════════════════════════════

  const m = currentMonth;

  const fixedMap = monthFixedByCat(m);

  // Annual totals across all fixed categories for a quick overview.
  const annualFixed = Array.from({length: 12}, (_, i) => getMonthData(i).fixed);
  const totAnnual = annualFixed.reduce((s, v) => s + v, 0);

  const fixedRows = yd().fixedCategories.map(f => {
    const row = fixedMap[f] || { amount: 0, paidWith: null };
    const pw = row.paidWith || DATA.lastUsedPaidWith || defaultPaidWith();
    return `<div style="padding:11px 0;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px">
      <div class="flex justify-between items-center gap-2">
        <input type="text" class="editable-label" value="${escapeHTML(f)}"
          onblur="renameCategory('fixed','${escapeHTML(f)}',this.value)"
          onkeydown="if(event.key==='Enter'){this.blur();}"/>
        <div class="flex items-center gap-2">
          ${amtInput(row.amount || 0, `fixed|${m}|${f}`)}
          <button class="delete-btn" onclick="deleteCategory('fixed','${escapeHTML(f)}')">${icon("trash")}</button>
        </div>
      </div>
      <div class="flex items-center gap-2" style="gap:6px">
        <span class="text-muted" style="font-size:10px">Paid with:</span>
        ${paidWithSelectHTML(pw, `__fixedPW_${m}_${btoa(unescape(encodeURIComponent(f))).replace(/=/g,"")}`)}
      </div>
    </div>`;
  }).join("");

  yd().fixedCategories.forEach(f => {
    const key = `__fixedPW_${m}_${btoa(unescape(encodeURIComponent(f))).replace(/=/g,"")}`;
    window[key] = (pw) => changeFixedPaidWith(m, f, pw);
  });

  return `
  <div class="kpi-grid">
    <div class="kpi" style="--accent-color:var(--orange)">
      <div class="kpi-label">${MONTHS_S[m]} Fixed</div>
      <div class="kpi-value" style="color:var(--orange)">${fmt(monthData.fixed)}</div>
      <div class="kpi-sub">${yd().fixedCategories.length} categor${yd().fixedCategories.length === 1 ? "y" : "ies"}</div>
    </div>
    <div class="kpi" style="--accent-color:var(--accent)">
      <div class="kpi-label">Year Total</div>
      <div class="kpi-value" style="color:var(--accent)">${fmt(totAnnual)}</div>
      <div class="kpi-sub">Avg ${fmt(avgMonthly)}/mo</div>
    </div>
  </div>

  ${renderMonthTabs(m, "var(--orange)")}

  <div class="card">
    <div class="card-title">
      <div class="card-title-left">${icon("lock")}${MONTHS[m]} Fixed Expenses</div>
    </div>
    <p class="note">Set these once per month (rent, insurance, subscriptions). Pick how each one gets paid — account or credit-card balances update automatically.</p>
    ${fixedRows || `<div class="empty"><div class="empty-icon">${icon("lock", 32)}</div>No fixed categories yet</div>`}
    <button class="btn-add" onclick="addCategory('fixed')">${icon("plus")} Add Fixed Expense</button>
    <div class="total-row">
      <span class="total-label" style="color:var(--orange)">Total Fixed</span>
      <span class="total-val" style="color:var(--orange)">${fmt(monthData.fixed)}</span>
    </div>
  </div>
  `;
}

// ═══════════════════════════════════════════════════════════════
// VIEW: BUDGET (per-category limits for variable spending)
// ═══════════════════════════════════════════════════════════════
function renderBudget() {
  const m = currentMonth;
  const monthData = getMonthData(m);

  const budgetCards = yd().variableCategories.map(c => {
    const spent = monthData.catTotals[c] || 0;
    const budget = yd().budgets[c] || 0;
    const pct = budget > 0 ? (spent / budget * 100) : 0;
    let cls = "budget-card";
    if (pct >= 100) cls += " over";
    else if (pct >= 80) cls += " warning";
    const barCls = pct >= 100 ? "red" : (pct >= 80 ? "yellow" : "green");
    return `<div class="${cls}">
      <div class="budget-header">
        <span class="budget-name" style="color:${colorFor(c)}">${escapeHTML(c)}</span>
        ${budget > 0 ? `<span class="budget-nums">${fmt(spent)} / ${fmt(budget)}</span>` : `<span class="text-muted" style="font-size:10px">No limit</span>`}
      </div>
      <div class="flex items-center gap-2">
        <div style="flex:1">
          <div class="progress-bar">
            <div class="progress-fill ${barCls}" style="width:${Math.min(pct, 100)}%"></div>
          </div>
        </div>
        ${amtInput(budget, `budget|${c}`, "Limit")}
      </div>
      ${pct >= 100 ? `<div style="font-size:10px;color:var(--red);margin-top:6px;font-weight:600;display:flex;align-items:center;gap:4px">${icon("alert-triangle")} Over budget by ${fmt(spent - budget)}</div>` : pct >= 80 ? `<div style="font-size:10px;color:var(--yellow);margin-top:6px;font-weight:600;display:flex;align-items:center;gap:4px">${icon("alert-triangle")} ${pct.toFixed(0)}% of budget used</div>` : ""}
    </div>`;
  }).join("");

  return `
  ${renderMonthTabs(m, "var(--red)")}

  <div class="card">
    <div class="card-title"><div class="card-title-left">${icon("target")}Monthly Budget Limits</div></div>
    <p class="note">Limit per variable category · 80% = yellow, 100% = red. Fixed expenses live on their own page now.</p>
    ${budgetCards}
  </div>
  `;
}

// ═══════════════════════════════════════════════════════════════

function renderIncome() {

      <div class="flex justify-between items-center gap-2">
        <input type="text" class="editable-label" value="${escapeHTML(c)}"

        <div class="flex items-center gap-2">
          ${amtInput(row.amount || 0, `income|${m}|${c}`)}
          <button class="delete-btn" onclick="deleteCategory('income','${escapeHTML(c)}')">${icon("trash")}</button>
        </div>
      </div>
      <div class="flex items-center gap-2" style="gap:6px">
        <span class="text-muted" style="font-size:10px">Received to:</span>
        ${paidWithSelectHTML(receivedToPW, `__incomePW_${m}_${btoa(unescape(encodeURIComponent(c))).replace(/=/g,"")}`, { accountsOnly: true })}
      </div>
    </div>`;
  }).join("");

  yd().incomeCategories.forEach(c => {
    const key = `__incomePW_${m}_${btoa(unescape(encodeURIComponent(c))).replace(/=/g,"")}`;
    window[key] = (pw) => changeIncomeReceivedTo(m, c, pw);
  });

  const monthlyInc = Array.from({length: 12}, (_, i) => getMonthData(i).income);
  const maxInc = Math.max(...monthlyInc, 1);
  const incBars = monthlyInc.map((v, i) => {
    const h = Math.round((v / maxInc) * 100) + 2;
    return `<div style="flex:1;height:${h}px;border-radius:3px 3px 0 0;background:${i === m ? "var(--green)" : "rgba(39,174,96,0.4)"};min-height:3px"></div>`;
  }).join("");
  const incLabels = MONTHS_S.map((mn, i) => `<div class="bar-label" style="${i === m ? "color:var(--green);font-weight:700" : ""}">${mn}</div>`).join("");

  return `
  ${renderMonthTabs(m, "var(--green)")}

  <div class="card">

    </div>
    <div class="divider"></div>
    <div class="flex justify-between" style="font-size:12px;margin-bottom:6px">
      <span class="text-dim">Total Expenses</span>
      <span class="mono" style="color:var(--red)">${fmt(monthData.expenses)}</span>
    </div>
    <div class="flex justify-between" style="font-size:14px;font-weight:700">

// ═══════════════════════════════════════════════════════════════
// VIEW: DEBT
// ═══════════════════════════════════════════════════════════════
function renderDebt() {
  const m = currentMonth;
  const a = getAnnual();
  const payMap = monthDebtPayByDebt(m);

  const overviewCards = DATA.debts.map(d => {
    const balance = Number(d.balance) || 0;
    const paidYTD = Array.from({length: 12}, (_, i) => monthDebtPayByDebt(i)[d.id]?.amount || 0).reduce((s, v) => s + v, 0);
    return `<div class="debt-card">
      <div class="debt-header">
        <input type="text" class="debt-name-input" value="${escapeHTML(d.name)}"
          onblur="onTextBlur(this,'debtName|${d.id}')"
          onkeydown="if(event.key==='Enter'){this.blur();}"/>
        <button class="delete-btn" onclick="deleteDebt('${d.id}')">${icon("trash")}</button>
      </div>
      <div class="debt-grid">
        <div>
          <div class="debt-field-label">Balance</div>
          ${amtInput(balance, `debt|${d.id}|balance`)}
        </div>
        <div>
          <div class="debt-field-label">Min Pay</div>
          ${amtInput(d.minPay, `debt|${d.id}|minPay`)}
        </div>
        <div>
          <div class="debt-field-label">Rate %</div>
          <input type="number" inputmode="decimal" step="0.1" class="amt-input" style="width:100%"
            value="${d.interestRate || ""}" placeholder="0"
            onblur="onAmtBlur(this,'debt|${d.id}|interestRate')"/>
        </div>
      </div>
      <div class="debt-stats">
        <span style="color:var(--green)">Paid ${currentYear}: ${fmt(paidYTD)}</span>
        <span style="color:var(--red)">Current: ${fmt(balance)}</span>
      </div>
      <div class="flex items-center gap-2" style="margin-top:10px;font-size:10px;color:var(--text-dim)">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" ${d.isPaymentMethod ? "checked" : ""} onchange="toggleDebtPaymentMethod('${d.id}')" style="accent-color:var(--accent)"/>
          Usable as payment method
        </label>
      </div>
    </div>`;
  }).join("");

  // Debt payoff simulator (uses current balance, constant avg pay)
  const monthPay = Object.values(payMap).reduce((s,r) => s + (r.amount||0), 0);
  const avgMonthlyPay = (() => {
    let total = 0, n = 0;
    for (let i = 0; i < 12; i++) {
      const p = monthSumByType(i, "debtPayment");
      if (p > 0) { total += p; n++; }
    }
    return n > 0 ? total / n : monthPay;
  })();

  let avSim = "", snSim = "";
  const activeDebts = DATA.debts.filter(d => d.balance > 0);
  if (activeDebts.length > 0 && avgMonthlyPay > 0) {
    const simulate = (mode) => {
      const debts = activeDebts.map(d => ({ ...d, balance: Number(d.balance)||0 }));
      debts.sort((x, y) => mode === "avalanche" ? (y.interestRate||0) - (x.interestRate||0) : x.balance - y.balance);
      let months = 0, totalInterest = 0;
      const avgPay = avgMonthlyPay;
      while (debts.some(d => d.balance > 0) && months < 600) {
        let remaining = avgPay;
        debts.forEach(d => {
          if (d.balance > 0) {
            const interest = d.balance * ((d.interestRate || 0) / 100 / 12);
            d.balance += interest; totalInterest += interest;
          }
        });
        debts.forEach(d => {
          if (d.balance > 0 && remaining > 0) {
            const pay = Math.min(d.minPay || 0, d.balance, remaining);
            d.balance -= pay; remaining -= pay;
          }
        });
        const target = debts.find(d => d.balance > 0);
        if (target && remaining > 0) {
          const pay = Math.min(target.balance, remaining);
          target.balance -= pay;
        }
        months++;
      }
      return { months, totalInterest };
    };
    const av = simulate("avalanche");
    const sn = simulate("snowball");
    avSim = `<div class="flex justify-between" style="padding:6px 0;font-size:12px">
      <span class="text-dim" style="display:inline-flex;align-items:center;gap:6px">${icon("mountain")} Avalanche (highest rate first)</span>
      <span class="mono">${av.months} mo · <span style="color:var(--red)">${fmt(av.totalInterest)}</span> interest</span>
    </div>`;
    snSim = `<div class="flex justify-between" style="padding:6px 0;font-size:12px">
      <span class="text-dim" style="display:inline-flex;align-items:center;gap:6px">${icon("snowflake")} Snowball (smallest first)</span>
      <span class="mono">${sn.months} mo · <span style="color:var(--red)">${fmt(sn.totalInterest)}</span> interest</span>
    </div>`;
  }

  const payRows = DATA.debts.map(d => {
    const row = payMap[d.id] || { amount: 0, paidWith: null };
    const pw = row.paidWith || DATA.lastUsedPaidWith || defaultPaidWith();
    return `<div style="padding:11px 0;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px">
      <div class="flex justify-between items-center gap-2">
        <div class="form-label">${escapeHTML(d.name)}</div>
        ${amtInput(row.amount || 0, `debtPay|${m}|${d.id}`)}
      </div>
      <div class="flex items-center gap-2" style="gap:6px">
        <span class="text-muted" style="font-size:10px">Paid from:</span>
        ${paidWithSelectHTML(pw, `__debtPayPW_${m}_${d.id}`, { accountsOnly: true })}
      </div>
    </div>`;
  }).join("");

  DATA.debts.forEach(d => {
    window[`__debtPayPW_${m}_${d.id}`] = (pw) => changeDebtPayPaidWith(m, d.id, pw);
  });

  return `
  <div class="kpi-grid">
    <div class="kpi" style="--accent-color:var(--purple)">
      <div class="kpi-label">Total Debt</div>
      <div class="kpi-value" style="color:var(--purple)">${fmt(a.totalDebt)}</div>
    </div>
    <div class="kpi" style="--accent-color:var(--green)">
      <div class="kpi-label">Paid This Year</div>
      <div class="kpi-value" style="color:var(--green)">${fmt(a.totDebtPaid)}</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <div class="card-title-left">${icon("credit-card")}My Debts</div>
      <button class="btn btn-ghost" style="padding:5px 10px;font-size:10px" onclick="addDebt()">${icon("plus")} Add</button>
    </div>
    <p class="note">Uncheck "Usable as payment method" for non-credit debts (e.g. personal loans). Balance auto-decreases as you log payments.</p>
    ${overviewCards || `<div class="empty"><div class="empty-icon">${icon("check-circle", 32)}</div>No debts tracked</div>`}
  </div>

  ${avSim ? `<div class="card">
    <div class="card-title"><div class="card-title-left">${icon("target")}Debt Payoff Projection</div></div>
    <p class="note">Based on avg ${fmt(avgMonthlyPay)}/month (actual pace this year). Interest rate required for accuracy.</p>
    ${avSim}${snSim}
  </div>` : ""}

  ${renderMonthTabs(m, "var(--purple)")}
  <div class="card">
    <div class="card-title"><div class="card-title-left">${icon("credit-card")}${MONTHS[m]} Payments</div></div>
    ${payRows}
    <div class="total-row">
      <span class="total-label" style="color:var(--purple)">Month Total</span>
      <span class="total-val" style="color:var(--purple)">${fmt(monthPay)}</span>
    </div>
  </div>
  `;
}
