// ═══════════════════════════════════════════════════════════════
// VIEW: INSIGHTS
// ═══════════════════════════════════════════════════════════════
function renderInsights() {
  const a = getAnnual();
  const monthly = Array.from({length: 12}, (_, m) => getMonthData(m));
  const insights = [];
  const curM = TODAY.getMonth();

  if (curM > 0 && monthly[curM].expenses > 0) {
    const curExp = monthly[curM].expenses;
    const prevExp = monthly[curM - 1].expenses;
    if (prevExp > 0) {
      const diff = ((curExp - prevExp) / prevExp * 100);
      if (Math.abs(diff) > 10) {
        insights.push({
          level: diff > 0 ? "warning" : "positive",
          icon: diff > 0 ? "📈" : "📉",
          title: `${MONTHS_S[curM]} spending is ${diff > 0 ? "up" : "down"} ${Math.abs(diff).toFixed(0)}% vs ${MONTHS_S[curM-1]}`,
          body: `This month: ${fmt(curExp)} · Last month: ${fmt(prevExp)} · Change: ${fmt(curExp - prevExp, true)}`
        });
      }
    }
  }

  Object.entries(a.catTotals).forEach(([cat, total]) => {
    if (curM > 0 && total > 0) {
      const curCat = monthly[curM].catTotals[cat] || 0;
      const prevCat = monthly[curM - 1].catTotals[cat] || 0;
      if (prevCat > 0 && curCat > 0) {
        const diff = ((curCat - prevCat) / prevCat * 100);
        if (diff > 30 && curCat > 50) {
          insights.push({
            level: "warning", icon: "⚠️",
            title: `${cat} spending up ${diff.toFixed(0)}% this month`,
            body: `${MONTHS_S[curM-1]}: ${fmt(prevCat)} → ${MONTHS_S[curM]}: ${fmt(curCat)}`
          });
        }
      }
    }
  });

  if (a.balance < 0) {
    insights.push({ level: "critical", icon: "🚨",
      title: `You're running a deficit of ${fmt(Math.abs(a.balance))}`,
      body: `Expenses exceed income by ${fmt(Math.abs(a.balance)/12)}/month on average.` });
  } else if (a.balance > 0) {
    insights.push({ level: "positive", icon: "💰",
      title: `You have a surplus of ${fmt(a.balance)}`,
      body: `Great work! Consider putting this toward debt or savings.` });
  }

  const overBudget = yd().variableCategories.filter(c => {
    const spent = monthly[curM].catTotals[c] || 0;
    const budget = yd().budgets[c] || 0;
    return budget > 0 && spent > budget;
  });
  if (overBudget.length > 0) {
    insights.push({ level: "warning", icon: "🎯",
      title: `Over budget in ${overBudget.length} ${overBudget.length === 1 ? "category" : "categories"}`,
      body: `This month: ${overBudget.join(", ")}. Adjust spending or raise the limit.` });
  }

  const sortedCats = Object.entries(a.catTotals).sort((x,y) => y[1] - x[1]);
  if (sortedCats.length > 0 && sortedCats[0][1] > 0) {
    const [topCat, topVal] = sortedCats[0];
    const pct = a.totVar > 0 ? (topVal / a.totVar * 100) : 0;
    insights.push({ level: pct > 40 ? "warning" : "positive", icon: "🏆",
      title: `${topCat} is your biggest spending category`,
      body: `${fmt(topVal)} this year · ${pct.toFixed(0)}% of variable. ${pct > 40 ? "Dominating your budget." : "Reasonable share."}` });
  }

  if (a.totalDebt > 0) {
    if (a.totDebtPaid === 0) {
      insights.push({ level: "critical", icon: "💳",
        title: "No debt payments logged yet",
        body: `You have ${fmt(a.totalDebt)} in debt. Start with even small consistent payments.` });
    } else {
      const avgMonthlyPay = a.totDebtPaid / Math.max(1, curM + 1);
      const monthsLeft = avgMonthlyPay > 0 ? a.debtRemaining / avgMonthlyPay : 0;
      insights.push({ level: "positive", icon: "💪",
        title: `${fmt(a.totDebtPaid)} paid this year`,
        body: `At current rate (${fmt(avgMonthlyPay)}/month avg), debt-free in ~${monthsLeft.toFixed(0)} more months.` });
    }
  }

  if (a.totInc > 0) {
    const savingsRate = a.totSaved / a.totInc * 100;
    insights.push({
      level: savingsRate >= 15 ? "positive" : savingsRate >= 5 ? "warning" : "critical",
      icon: "💸",
      title: `Savings rate: ${savingsRate.toFixed(1)}%`,
      body: savingsRate >= 15 ? "Excellent — on track for financial health." :
            savingsRate >= 5 ? "Decent. Target 15-20% for long-term stability." :
            "Very low. Prioritize building this up — even 5% is a start."
    });
  }

  const avgMonthlyExp = a.totExp / 12;
  const emergencyGoal = DATA.goals.find(g => /emergency/i.test(g.name));
  if (emergencyGoal && avgMonthlyExp > 0) {
    const monthsCovered = emergencyGoal.saved / avgMonthlyExp;
    insights.push({
      level: monthsCovered >= 3 ? "positive" : monthsCovered >= 1 ? "warning" : "critical",
      icon: "🛡️",
      title: `Emergency fund covers ${monthsCovered.toFixed(1)} months`,
      body: monthsCovered >= 3 ? "You're well-protected." : `Target 3-6 months = ${fmt(avgMonthlyExp * 3)}-${fmt(avgMonthlyExp * 6)}`
    });
  }

  // Payment-method insights
  const ccSpendThisMonth = monthTxs(curM)
    .filter(t => (t.type === "expense" || t.type === "fixed") && t.paidWith?.kind === "debt")
    .reduce((s,t) => s + (Number(t.amount)||0), 0);
  const totalSpendThisMonth = monthly[curM].expenses;
  if (ccSpendThisMonth > 0 && totalSpendThisMonth > 0) {
    const pct = ccSpendThisMonth / totalSpendThisMonth * 100;
    insights.push({
      level: pct > 50 ? "warning" : "positive",
      icon: "💳",
      title: `${pct.toFixed(0)}% of this month's spending is on credit cards`,
      body: pct > 50 ? "Relying heavily on credit — interest compounds fast. Aim to pay this down each month." : `${fmt(ccSpendThisMonth)} of ${fmt(totalSpendThisMonth)} went to cards this month.`
    });
  }

  const advisorTips = [];
  const restCat = Object.keys(a.catTotals).find(c => /restaurant/i.test(c));
  if (restCat && a.catTotals[restCat] > a.totVar * 0.15) {
    advisorTips.push({ icon: "🍽️", title: `Restaurant spending is high`,
      body: `${fmt(a.catTotals[restCat])} this year. Reducing 30% saves ${fmt(a.catTotals[restCat] * 0.3)}.` });
  }
  const transCat = Object.keys(a.catTotals).find(c => /transport/i.test(c));
  if (transCat && a.catTotals[transCat] > 1000) {
    advisorTips.push({ icon: "🚗", title: `Transportation costs are significant`,
      body: `${fmt(a.catTotals[transCat])} this year. Monthly transit passes or carpooling may help.` });
  }
  const incomes = monthly.map(m => m.income).filter(v => v > 0);
  if (incomes.length >= 3) {
    const avgInc = incomes.reduce((s,v) => s+v, 0) / incomes.length;
    const variance = incomes.reduce((s,v) => s + Math.pow(v - avgInc, 2), 0) / incomes.length;
    const cv = Math.sqrt(variance) / avgInc;
    if (cv > 0.4) {
      advisorTips.push({ icon: "📊", title: "Your income is highly variable",
        body: "Build a larger emergency fund to smooth out low-income months. Target: 6 months of expenses." });
    }
  }

  return `
  <div class="card">
    <div class="card-title"><div class="card-title-left">🧠 Smart Insights</div></div>
    <p class="note">Auto-generated from your data — updates as you log expenses.</p>
    ${insights.length === 0 ? '<div class="empty"><div class="empty-icon">📊</div>Add more data to see insights</div>' : insights.map(ins => `
      <div class="insight ${ins.level}">
        <div class="insight-title">${ins.icon} ${escapeHTML(ins.title)}</div>
        <div class="insight-body">${escapeHTML(ins.body)}</div>
      </div>`).join("")}
  </div>

  ${advisorTips.length > 0 ? `<div class="card">
    <div class="card-title"><div class="card-title-left">💡 Advisor Tips</div></div>
    ${advisorTips.map(t => `
      <div class="insight">
        <div class="insight-title">${t.icon} ${escapeHTML(t.title)}</div>
        <div class="insight-body">${escapeHTML(t.body)}</div>
      </div>`).join("")}
  </div>` : ""}
  `;
}

// ═══════════════════════════════════════════════════════════════
// QUICK-ADD MODAL
// ═══════════════════════════════════════════════════════════════
let quickAddState = {};

function openQuickAdd() {
  const today = new Date();
  const isCurrentYear = today.getFullYear() === currentYear;
  const m = isCurrentYear ? today.getMonth() : 0;
  const d = isCurrentYear ? today.getDate() - 1 : 0;
  const cats = yd().variableCategories;
  quickAddState = {
    amount: "",
    category: cats[0] || null,
    m, d,
    paidWith: DATA.lastUsedPaidWith || defaultPaidWith(),
    note: ""
  };

  document.getElementById("modal-content").innerHTML = `
    <div class="modal-title">
      <span>⚡ Quick Add</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <p class="note">Log a variable expense · ${MONTHS[m]} ${d + 1}, ${currentYear}</p>

    <div style="margin:12px 0">
      <label class="debt-field-label">Amount</label>
      <input type="number" inputmode="decimal" step="0.01" class="amt-input" id="qa-amount"
        style="width:100%;text-align:left;font-size:22px;padding:14px"
        placeholder="0.00" autofocus
        oninput="quickAddState.amount=this.value"/>
    </div>

    <div style="margin:14px 0">
      <label class="debt-field-label">Category</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px" id="qa-cats">
        ${cats.map(c => `
          <button class="btn" data-cat="${escapeHTML(c)}" style="background:${colorFor(c)}22;color:${colorFor(c)};border:1.5px solid ${colorFor(c)}44;justify-content:center;padding:10px"
            onclick="selectQuickCat('${escapeHTML(c)}')">${escapeHTML(c)}</button>`).join("")}
      </div>
    </div>

    <div style="margin:14px 0">
      <label class="debt-field-label">Paid with</label>
      ${paidWithChipsHTML(quickAddState.paidWith)}
    </div>

    <div style="margin:14px 0">
      <label class="debt-field-label">Date</label>
      <input type="date" class="text-input" id="qa-date"
        value="${currentYear}-${String(m+1).padStart(2,'0')}-${String(d+1).padStart(2,'0')}"
        onchange="quickAddState.dateStr=this.value"/>
    </div>

    <div style="margin:14px 0">
      <label class="debt-field-label">Note (optional)</label>
      <input type="text" class="text-input" placeholder="e.g. Loblaws"
        oninput="quickAddState.note=this.value"/>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="saveQuickAdd()">Save</button>
    </div>
  `;
  document.getElementById("modal-overlay").classList.add("show");
  setTimeout(() => document.getElementById("qa-amount")?.focus(), 100);
  selectQuickCat(quickAddState.category, true);
}

function selectQuickCat(cat, keepState) {
  if (!keepState) quickAddState.category = cat;
  document.querySelectorAll("#qa-cats [data-cat]").forEach(btn => {
    const c = btn.getAttribute("data-cat");
    const isSel = c === cat;
    btn.style.background = isSel ? colorFor(c) : colorFor(c) + "22";
    btn.style.color = isSel ? "#fff" : colorFor(c);
    btn.style.fontWeight = isSel ? "700" : "600";
  });
}

function selectQuickPaidWith(kind, id) {
  quickAddState.paidWith = { kind, id };
  document.querySelectorAll(".pw-chip[data-pw]").forEach(el => {
    el.classList.toggle("active", el.getAttribute("data-pw") === `${kind}:${id}`);
  });
}

function saveQuickAdd() {
  const amt = parseFloat(quickAddState.amount);
  if (!amt || amt <= 0) { toast("Enter an amount", true); return; }
  if (!quickAddState.category) { toast("Pick a category", true); return; }
  if (!quickAddState.paidWith) { toast("Pick a payment method", true); return; }

  const dateStr = document.getElementById("qa-date").value;
  const [y, mm, dd] = dateStr.split("-").map(Number);
  if (y !== currentYear) {
    if (!DATA.years[y]) DATA.years[y] = defaultYearData(y);
    currentYear = y;
    DATA.currentYear = y;
  }
  const m = mm - 1;
  const d = dd - 1;

  addTransaction({
    type: "expense",
    date: toISO(y, m, d),
    amount: amt,
    category: quickAddState.category,
    paidWith: quickAddState.paidWith,
    note: (quickAddState.note || "").trim()
  }, m);
  closeModal();
  render();
  toast(`Added ${fmt(amt)} to ${quickAddState.category}`);
}

// ═══════════════════════════════════════════════════════════════
// SETTINGS MODAL
// ═══════════════════════════════════════════════════════════════
function openSettings() {
  const hasV3Snap = !!localStorage.getItem(LEGACY_KEY);
  const canShare = !!(navigator.canShare && typeof File !== "undefined");
  const lastSyncLabel = DATA.lastSyncAt
    ? `Last sync: ${new Date(DATA.lastSyncAt).toLocaleString()} ${DATA.lastSyncDirection === "up" ? "→ iCloud" : "← iCloud"}`
    : "Never synced on this device";

  document.getElementById("modal-content").innerHTML = `
    <div class="modal-title">
      <span>⚙️ Settings & Data</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div style="margin:16px 0;padding:14px;border-radius:12px;background:var(--accent-soft);border:1px solid rgba(108,92,231,0.3)">
      <div style="font-size:13px;font-weight:700;margin-bottom:6px;color:#fff">☁️ iCloud Sync</div>
      <p class="note" style="margin-bottom:10px;color:#c9b8f5">
        Keep your phone and laptop in sync by saving one shared file to iCloud Drive.
        Tap <b>Sync to iCloud</b>, pick <b>Save to Files → iCloud Drive</b>, and always overwrite the same file.
        On your other device, tap <b>Pull from iCloud</b> and pick that file.
      </p>
      <div class="flex gap-2" style="flex-direction:column">
        <button class="btn btn-primary" style="justify-content:center" onclick="syncToICloud()">
          ⬆️ Sync to iCloud ${canShare ? "(via Share sheet)" : "(download)"}
        </button>
        <label class="btn btn-ghost" style="justify-content:center;cursor:pointer">
          ⬇️ Pull from iCloud
          <input type="file" accept=".json,application/json" style="display:none" onchange="if(this.files[0])syncFromICloudPick(this.files[0])"/>
        </label>
      </div>
      <div id="sync-status" class="note" style="margin-top:10px;color:#9d8ee0">${escapeHTML(lastSyncLabel)}</div>
      <p class="note" style="margin-top:8px;font-size:10px">
        💡 First-time tip: on iPhone, after tapping <b>Save to Files</b>, long-press the filename and rename it to <code>finance-tracker-sync.json</code>. Always overwrite this same file from both devices.
      </p>
    </div>

    <div style="margin:16px 0">
      <div style="font-size:12px;font-weight:700;margin-bottom:8px">📦 Manual Backup</div>
      <p class="note">Download a dated snapshot (keep alongside your iCloud sync file for safety).</p>
      <div class="flex gap-2" style="margin-top:10px">
        <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="exportData()">⬇️ Export Dated Backup</button>
        <label class="btn btn-ghost" style="flex:1;justify-content:center;cursor:pointer">
          ⬆️ Import Any Backup
          <input type="file" accept=".json" style="display:none" onchange="if(this.files[0])importData(this.files[0])"/>
        </label>
      </div>
      ${DATA.lastBackup ? `<div class="note" style="margin-top:8px">Last backup: ${new Date(DATA.lastBackup).toLocaleDateString()}</div>` : ""}
      ${hasV3Snap ? `<button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:10px" onclick="restoreV3Snapshot()">↺ Restore v3 snapshot</button>` : ""}
    </div>

    <div class="divider"></div>

    <div style="margin:16px 0">
      <div style="font-size:12px;font-weight:700;margin-bottom:8px">💱 Currency Symbol</div>
      <input type="text" class="text-input" value="${escapeHTML(DATA.currency || "$")}" maxlength="3"
        onblur="DATA.currency=this.value.trim()||'$';save();render();" style="max-width:100px"/>
      <p class="note" style="margin-top:6px">Display only — no FX conversion.</p>
    </div>

    <div class="divider"></div>

    <div style="margin:16px 0">
      <div style="font-size:12px;font-weight:700;margin-bottom:8px">📅 Year</div>
      ${renderYearSelector()}
      <p class="note" style="margin-top:8px">Each year keeps its own transactions.</p>
    </div>

    <div class="divider"></div>

    <div style="margin:16px 0">
      <div style="font-size:12px;font-weight:700;margin-bottom:8px;color:var(--red)">⚠️ Danger Zone</div>
      <button class="btn btn-danger" style="width:100%;justify-content:center;margin-bottom:8px" onclick="resetYear()">🗑 Reset ${currentYear} only</button>
      <button class="btn btn-danger" style="width:100%;justify-content:center" onclick="resetAll()">🔥 Delete ALL data</button>
    </div>

    <div class="modal-actions">
      <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="closeModal()">Done</button>
    </div>
  `;
  document.getElementById("modal-overlay").classList.add("show");
}

async function resetYear() {
  if (!(await appConfirm(`Delete all transactions for ${currentYear}? This cannot be undone — export a backup first.`))) return;
  DATA.years[currentYear] = defaultYearData(currentYear);
  save(); closeModal(); render();
  toast(`${currentYear} reset`);
}

async function resetAll() {
  if (!(await appConfirm("Delete ALL data across every year, all debts, all goals, all accounts? Export a backup first!"))) return;
  if (!(await appConfirm("Really? This is irreversible."))) return;
  localStorage.removeItem(STORAGE_KEY);
  DATA = defaultData();
  currentYear = CURRENT_YEAR;
  save(); closeModal(); render();
  toast("All data deleted");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("show");
}

// ═══════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════
function render() {
  const el = document.getElementById("view-content");
  const views = {
    dash: renderDash, daily: renderDaily, budget: renderBudget,
    income: renderIncome, debt: renderDebt, wealth: renderWealth, insights: renderInsights
  };
  el.innerHTML = (views[currentView] || renderDash)();
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.view === currentView));
}

// ═══════════════════════════════════════════════════════════════
// VIEWPORT HEIGHT — fixes iOS Safari keyboard whitespace bug
// ═══════════════════════════════════════════════════════════════
function updateVisibleHeight() {
  const h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
  document.documentElement.style.setProperty("--visible-h", h + "px");
}
updateVisibleHeight();
if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", updateVisibleHeight);
  window.visualViewport.addEventListener("scroll", updateVisibleHeight);
}
window.addEventListener("resize", updateVisibleHeight);
window.addEventListener("orientationchange", () => setTimeout(updateVisibleHeight, 150));

// ═══════════════════════════════════════════════════════════════
// SERVICE WORKER
// ═══════════════════════════════════════════════════════════════
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(err => console.warn("SW registration failed", err));
  });
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
(async function init() {
  await load();
  setView("dash");
})();
</script>
